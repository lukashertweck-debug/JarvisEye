<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Desk — JARVIS</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#04060a;--bg2:#080c14;--bg3:#0c1018;--bdr:rgba(59,130,246,0.08);
--txt:#c8d0dc;--t2:#5a6a80;--t3:#2e3a4a;--blue:#3b82f6;--grn:#22c55e;--red:#ef4444;--amb:#f59e0b;--cyan:#06b6d4;
--f:'JetBrains Mono',monospace}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--f);font-size:11px;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}

/* TAB BAR */
.tab-bar{display:flex;align-items:center;gap:3px;padding:8px 14px;border-bottom:1px solid var(--bdr);background:rgba(8,12,20,.6);flex-shrink:0}
.tab-title{font-size:9px;font-weight:700;letter-spacing:2px;color:#fff;margin-right:8px}
.tr-tab{font-family:var(--f);font-size:7px;padding:4px 12px;background:transparent;border:1px solid var(--bdr);color:var(--t2);border-radius:3px;cursor:pointer;letter-spacing:1px;font-weight:600;transition:.15s}
.tr-tab:hover{border-color:var(--blue);color:var(--blue)}
.tr-tab.active{border-color:var(--grn);color:var(--grn);background:rgba(34,197,94,.08)}

/* OVERVIEW TAB */
#trOverview{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.mkt-grid{display:grid;grid-template-columns:repeat(4,1fr);background:rgba(59,130,246,.06);gap:1px;flex-shrink:0}
.mkt-sec{background:var(--bg);padding:7px 10px}
.mkt-sec-hd{font-size:6px;color:var(--t2);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--bdr)}
.mkt-row{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;column-gap:4px;padding:3px 0;border-bottom:1px solid rgba(59,130,246,.03)}
.mkt-row:last-child{border-bottom:none}
.mkt-sym{font-size:7.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mkt-price{font-size:8px;color:var(--txt);font-variant-numeric:tabular-nums;white-space:nowrap}
.mkt-chg{font-size:7.5px;font-weight:700;white-space:nowrap;text-align:right;min-width:44px}
.bias-badge{font-size:5px;font-weight:700;padding:1px 4px;border-radius:2px;letter-spacing:.5px;text-align:center;min-width:26px;flex-shrink:0}
.bias-badge.bull{background:rgba(34,197,94,.12);color:var(--grn);border:1px solid rgba(34,197,94,.2)}
.bias-badge.bear{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.bias-badge.neut{background:rgba(245,158,11,.08);color:var(--amb);border:1px solid rgba(245,158,11,.15)}
.mkt-status{display:flex;align-items:center;padding:4px 14px;font-size:7px;color:var(--t3);border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);gap:8px;flex-shrink:0;background:rgba(8,12,20,.3)}
.mkt-upd{flex:1}
.mkt-rfsh{font-family:var(--f);font-size:6.5px;padding:2px 7px;background:transparent;border:1px solid var(--bdr);color:var(--t2);border-radius:2px;cursor:pointer;letter-spacing:.5px;transition:.1s}
.mkt-rfsh:hover{border-color:var(--blue);color:var(--blue)}
.brief-wrap{flex:1;display:flex;flex-direction:column;min-height:0}
.brief-actions{padding:7px 14px;display:flex;align-items:center;gap:6px;flex-shrink:0;border-bottom:1px solid var(--bdr);background:rgba(8,12,20,.3)}
.brief-out{flex:1;padding:10px 14px;overflow-y:auto;font-size:9px;color:var(--txt);line-height:1.8;white-space:pre-wrap}
.brief-out::-webkit-scrollbar{width:3px}.brief-out::-webkit-scrollbar-thumb{background:rgba(34,197,94,.15);border-radius:2px}

/* SHARED */
.tr-pane{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.tr-sel{font-family:var(--f);font-size:8px;background:var(--bg);border:1px solid var(--bdr);color:var(--txt);padding:5px 8px;border-radius:3px;cursor:pointer;outline:none}
.tr-sel:focus{border-color:var(--blue)}
.tr-gen-btn{font-family:var(--f);font-size:8px;padding:6px 14px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--grn);border-radius:4px;cursor:pointer;letter-spacing:1px;font-weight:700;transition:.15s;white-space:nowrap}
.tr-gen-btn:hover{background:rgba(34,197,94,.2);color:#fff}
.tr-inp{font-family:var(--f);font-size:8px;background:var(--bg);border:1px solid var(--bdr);color:var(--txt);padding:5px 8px;border-radius:3px;outline:none;flex:1;min-width:60px}
.tr-inp:focus{border-color:var(--blue)}

/* LEVELS TAB */
.lv-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.lv-l{font-size:7.5px;color:var(--t2);letter-spacing:1px;width:55px;flex-shrink:0;text-transform:uppercase}
.lv-inp{flex:1;font-size:10px}
.tr-levels-out{flex:1;overflow-y:auto;padding:8px 14px}
.tr-levels-out::-webkit-scrollbar{width:3px}.tr-levels-out::-webkit-scrollbar-thumb{background:rgba(245,158,11,.1);border-radius:2px}
.lv-block{background:rgba(8,12,20,.6);border:1px solid var(--bdr);border-radius:5px;padding:10px;margin-bottom:8px}
.lv-block-title{font-size:7.5px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.lv-line{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.lv-line-name{font-size:8px;color:var(--t2)}.lv-line-val{font-size:10px;font-weight:700;color:#fff}
.lv-line-val.bull{color:var(--grn)}.lv-line-val.bear{color:var(--red)}.lv-line-val.key{color:var(--amb)}

/* MISC */
.loading{color:var(--blue);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="app">

  <div class="tab-bar">
    <span class="tab-title">TRADING DESK</span>
    <button class="tr-tab active" id="tab-overview" onclick="switchTab('overview',this)">OVERVIEW</button>
    <button class="tr-tab" id="tab-levels" onclick="switchTab('levels',this)">LEVELS</button>
  </div>

  <!-- OVERVIEW TAB -->
  <div id="trOverview">
    <div class="mkt-grid">
      <div class="mkt-sec">
        <div class="mkt-sec-hd">▪ INDICES / FUTURES</div>
        <div id="sec-indices"></div>
      </div>
      <div class="mkt-sec">
        <div class="mkt-sec-hd">▪ CRYPTO</div>
        <div id="sec-crypto"></div>
      </div>
      <div class="mkt-sec">
        <div class="mkt-sec-hd">▪ FOREX</div>
        <div id="sec-forex"></div>
      </div>
      <div class="mkt-sec">
        <div class="mkt-sec-hd">▪ COMMODITIES</div>
        <div id="sec-commodities"></div>
      </div>
    </div>
    <div class="mkt-status">
      <span class="mkt-upd" id="mktUpdated">FETCHING MARKET DATA...</span>
      <button class="mkt-rfsh" onclick="fetchMarkets()">&#8635; REFRESH</button>
    </div>
    <div class="brief-wrap">
      <div class="brief-actions">
        <select class="tr-sel" id="trSession">
          <option value="overall">Daily Overview</option>
          <option value="London">London Open</option>
          <option value="NY">New York Open</option>
          <option value="Asia">Asia Session</option>
        </select>
        <button class="tr-gen-btn" onclick="generateBrief()">&#9889; GENERATE AI MARKET BRIEF</button>
      </div>
      <div class="brief-out" id="trBriefOut"><div style="color:var(--t2);text-align:center;padding:24px 20px;font-size:9px;letter-spacing:2px">SELECT SESSION &amp; HIT GENERATE<br><br><span style="color:var(--t3)">AI produces technical + fundamental daily outlook<br>across all asset classes using live market data</span></div></div>
    </div>
  </div>

  <!-- LEVELS TAB -->
  <div class="tr-pane" id="trLevels" style="display:none">
    <div style="padding:10px 14px;display:grid;grid-template-columns:1fr 1fr;gap:16px;border-bottom:1px solid var(--bdr);flex-shrink:0;background:rgba(8,12,20,.4)">
      <div>
        <div style="font-size:7.5px;color:var(--blue);letter-spacing:2px;font-weight:700;margin-bottom:8px">NAS100</div>
        <div class="lv-row"><span class="lv-l">PDH</span><input class="tr-inp lv-inp" id="nasPDH" placeholder="Prev Day High" type="number"></div>
        <div class="lv-row"><span class="lv-l">PDL</span><input class="tr-inp lv-inp" id="nasPDL" placeholder="Prev Day Low" type="number"></div>
        <div class="lv-row"><span class="lv-l">Current</span><input class="tr-inp lv-inp" id="nasCur" placeholder="Auto-fills" type="number"></div>
      </div>
      <div>
        <div style="font-size:7.5px;color:var(--cyan);letter-spacing:2px;font-weight:700;margin-bottom:8px">GER40</div>
        <div class="lv-row"><span class="lv-l">PDH</span><input class="tr-inp lv-inp" id="gerPDH" placeholder="Prev Day High" type="number"></div>
        <div class="lv-row"><span class="lv-l">PDL</span><input class="tr-inp lv-inp" id="gerPDL" placeholder="Prev Day Low" type="number"></div>
        <div class="lv-row"><span class="lv-l">Current</span><input class="tr-inp lv-inp" id="gerCur" placeholder="Auto-fills" type="number"></div>
      </div>
    </div>
    <div style="padding:8px 14px;border-bottom:1px solid var(--bdr);display:flex;gap:6px;flex-shrink:0">
      <button class="tr-gen-btn" onclick="calcLevels()" style="flex:1">&#9658; CALCULATE KEY LEVELS</button>
      <button class="tr-gen-btn" onclick="autoFillLevels()" style="background:rgba(6,182,212,.1);border-color:rgba(6,182,212,.3);color:var(--cyan)">&#8635; AUTO-FILL LIVE PRICES</button>
    </div>
    <div class="tr-levels-out" id="trLevelsOut"><div style="color:var(--t2);text-align:center;padding:30px;font-size:9px;letter-spacing:2px">ENTER PDH / PDL THEN CALCULATE</div></div>
  </div>

</div>
<script>
/* ====== CONFIG ====== */
const _nk=['nvapi-','Qfusf1cSFUrF_EWG5KZXZ7ki5RrFfHx3Z','2ozPSNwkm8AhK8E3dtwlsvZNSlqV1kW'];
const NV_KEY=_nk.join('');
const PROXY=u=>'https://api.allorigins.win/get?url='+encodeURIComponent(u);

let userGroqKey=localStorage.getItem('jarvis.groq.key')||'';
let allMarketData={};

/* ====== SECURITY HELPERS ====== */
function sanitizeText(str){if(!str)return'';const d=document.createElement('div');d.textContent=String(str);return d.innerHTML;}

/* ====== MARKET DEFINITIONS ====== */
const MARKET_DEFS={
  indices:[
    {sym:'NAS100',key:'NAS100',yf:'^NDX'},
    {sym:'S&P 500',key:'SP500',yf:'^GSPC'},
    {sym:'GER40',key:'GER40',yf:'^GDAXI'},
    {sym:'NIKKEI',key:'N225',yf:'^N225'},
    {sym:'FTSE 100',key:'FTSE',yf:'^FTSE'},
  ],
  crypto:[
    {sym:'BTC/USD',key:'BTC'},
    {sym:'ETH/USD',key:'ETH'},
    {sym:'SOL/USD',key:'SOL'},
    {sym:'BNB/USD',key:'BNB'},
  ],
  forex:[
    {sym:'EUR/USD',key:'EURUSD'},
    {sym:'GBP/USD',key:'GBPUSD'},
    {sym:'USD/JPY',key:'USDJPY'},
    {sym:'AUD/USD',key:'AUDUSD'},
  ],
  commodities:[
    {sym:'GOLD',key:'GOLD',yf:'GC=F'},
    {sym:'SILVER',key:'SILVER',yf:'SI=F'},
    {sym:'OIL (WTI)',key:'OIL',yf:'CL=F'},
  ]
};

/* ====== BIAS ====== */
function getBias(chg){
  const c=parseFloat(chg);
  if(isNaN(c))return'neut';
  return c>0.3?'bull':c<-0.3?'bear':'neut';
}
function getBiasLabel(chg){const b=getBias(chg);return b==='bull'?'BULL':b==='bear'?'BEAR':'NEUT';}

function fmtPrice(price,key){
  if(typeof price==='string')return price;
  const p=Number(price);
  if(['NAS100','SP500','GER40','N225','FTSE','GOLD'].includes(key))return p.toLocaleString('en-US',{maximumFractionDigits:0});
  if(key==='BTC')return '$'+p.toLocaleString('en-US',{maximumFractionDigits:0});
  if(['ETH','BNB'].includes(key))return '$'+p.toFixed(0);
  if(key==='SOL')return '$'+p.toFixed(2);
  if(['SILVER','OIL'].includes(key))return p.toFixed(2);
  return String(price);
}

/* ====== RENDER GRID ====== */
function renderMktRow(sym,key){
  const m=allMarketData[key];
  if(!m)return`<div class="mkt-row"><span class="mkt-sym">${sym}</span><span class="mkt-price" style="color:var(--t3)">---</span><span class="mkt-chg" style="color:var(--t3)">---</span><span class="bias-badge neut">···</span></div>`;
  const bias=getBias(m.change);
  const c=parseFloat(m.change);
  const chgStr=!isNaN(c)?`${c>=0?'+':''}${c.toFixed(2)}%`:'--';
  const chgColor=c>0?'var(--grn)':c<0?'var(--red)':'var(--t2)';
  return`<div class="mkt-row">
    <span class="mkt-sym">${sym}</span>
    <span class="mkt-price">${fmtPrice(m.price,key)}</span>
    <span class="mkt-chg" style="color:${chgColor}">${chgStr}</span>
    <span class="bias-badge ${bias}">${getBiasLabel(m.change)}</span>
  </div>`;
}

function renderMarkets(){
  Object.keys(MARKET_DEFS).forEach(cat=>{
    const el=document.getElementById('sec-'+cat);
    if(el) el.innerHTML=MARKET_DEFS[cat].map(m=>renderMktRow(m.sym,m.key)).join('');
  });
  document.getElementById('mktUpdated').textContent=
    'Updated: '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+
    ' — auto-refreshes every 60s';
}

/* ====== FETCH MARKET DATA ====== */
async function fetchIndicesAndCommodities(){
  const syms=[...MARKET_DEFS.indices,...MARKET_DEFS.commodities];
  await Promise.allSettled(syms.map(async m=>{
    try{
      const url=`https://query1.finance.yahoo.com/v8/finance/chart/${m.yf}?interval=1d&range=2d`;
      const r=await fetch(PROXY(url));
      const j=await r.json();
      const raw=JSON.parse(j.contents);
      const meta=raw?.chart?.result?.[0]?.meta;
      if(meta) allMarketData[m.key]={
        price:meta.regularMarketPrice,
        change:((meta.regularMarketPrice-meta.previousClose)/meta.previousClose*100)
      };
    }catch(e){}
  }));
}

async function fetchCrypto(){
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,binancecoin&vs_currencies=usd&include_24hr_change=true');
    const d=await r.json();
    const map={bitcoin:'BTC',ethereum:'ETH',solana:'SOL',binancecoin:'BNB'};
    for(const [id,key] of Object.entries(map)){
      if(d[id]) allMarketData[key]={price:d[id].usd,change:d[id].usd_24h_change};
    }
  }catch(e){}
}

async function fetchForex(){
  try{
    const yest=new Date();yest.setDate(yest.getDate()-1);
    const yStr=yest.toISOString().split('T')[0];
    const [todR,yesR]=await Promise.allSettled([
      fetch('https://api.frankfurter.dev/v1/latest?base=USD&symbols=EUR,GBP,JPY,AUD'),
      fetch(`https://api.frankfurter.dev/v1/${yStr}?base=USD&symbols=EUR,GBP,JPY,AUD`)
    ]);
    if(todR.status!=='fulfilled'||yesR.status!=='fulfilled')return;
    const tod=await todR.value.json();
    const yes=await yesR.value.json();
    if(!tod.rates||!yes.rates)return;
    const e=1/tod.rates.EUR,ey=1/yes.rates.EUR;
    const g=1/tod.rates.GBP,gy=1/yes.rates.GBP;
    const j=tod.rates.JPY,jy=yes.rates.JPY;
    const a=1/tod.rates.AUD,ay=1/yes.rates.AUD;
    allMarketData.EURUSD={price:e.toFixed(4),change:(e-ey)/ey*100};
    allMarketData.GBPUSD={price:g.toFixed(4),change:(g-gy)/gy*100};
    allMarketData.USDJPY={price:j.toFixed(2),change:(j-jy)/jy*100};
    allMarketData.AUDUSD={price:a.toFixed(4),change:(a-ay)/ay*100};
  }catch(e){}
}

async function fetchMarkets(){
  document.getElementById('mktUpdated').textContent='FETCHING MARKET DATA...';
  await Promise.allSettled([fetchIndicesAndCommodities(),fetchCrypto(),fetchForex()]);
  renderMarkets();
}

/* ====== LLM ====== */
async function callLLM(systemPrompt,userMsg){
  const msgs=[{role:'system',content:systemPrompt},{role:'user',content:userMsg}];
  if(userGroqKey){
    try{
      const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+userGroqKey},
        body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:msgs,temperature:0.7,max_tokens:700})
      });
      const d=await r.json();
      if(d.choices?.[0]?.message?.content)return d.choices[0].message.content;
    }catch(e){}
  }
  const nvModels=['meta/llama-3.3-70b-instruct','meta/llama-3.1-8b-instruct'];
  for(let i=0;i<2;i++){
    try{
      const r=await fetch('https://corsproxy.io/?url=https://integrate.api.nvidia.com/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+NV_KEY},
        body:JSON.stringify({model:nvModels[i],messages:msgs,temperature:0.7,max_tokens:800})
      });
      if(!r.ok){if(i<1){await new Promise(ok=>setTimeout(ok,1000));continue;}throw new Error('HTTP '+r.status);}
      const d=await r.json();
      if(d.choices?.[0]?.message?.content)return d.choices[0].message.content;
    }catch(e){if(i<1)await new Promise(ok=>setTimeout(ok,1000));}
  }
  try{
    const r=await fetch('https://text.pollinations.ai/',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:msgs,model:'openai',jsonMode:false})
    });
    if(r.ok){
      const text=await r.text();
      try{const j=JSON.parse(text);if(j.choices?.[0]?.message?.content)return j.choices[0].message.content;}catch(e){}
      if(text&&text.length>2&&!text.includes('"error"'))return text;
    }
  }catch(e){}
  return 'AI temporarily unavailable. Add a free Groq API key at console.groq.com for guaranteed access.';
}

/* ====== AI MARKET BRIEF ====== */
async function generateBrief(){
  const session=document.getElementById('trSession').value;
  const out=document.getElementById('trBriefOut');
  out.innerHTML='<span class="loading">ANALYZING MARKETS...</span>';
  const now=new Date();
  let ctx=`DATE: ${now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}\nSESSION FOCUS: ${session}\n\nREAL-TIME MARKET DATA:\n`;
  Object.entries(MARKET_DEFS).forEach(([cat,mkts])=>{
    ctx+=`\n${cat.toUpperCase()}:\n`;
    mkts.forEach(m=>{
      const d=allMarketData[m.key];
      if(d){
        const c=parseFloat(d.change);
        const chgStr=!isNaN(c)?`${c>=0?'+':''}${c.toFixed(2)}%`:'N/A';
        ctx+=`  ${m.sym}: ${fmtPrice(d.price,m.key)} (${chgStr}) — ${getBiasLabel(d.change)}\n`;
      }else{
        ctx+=`  ${m.sym}: data unavailable\n`;
      }
    });
  });
  const sysPrompt=`You are JARVIS, an elite trading intelligence system. The user is an intraday scalper trading NAS100 and GER40 using SMC/ICT methodology.

Analyze the live market data and produce a concise daily market brief. Use EXACTLY this format:

MARKET SENTIMENT: [RISK-ON / RISK-OFF / MIXED]
[1 sentence overall reading based on indices + crypto + USD correlation]

INDICES:
• NAS100: [BULL/BEAR/NEUT] — [price context, momentum, key psychological level to watch]
• GER40: [BULL/BEAR/NEUT] — [price context, momentum, key level to watch]
• S&P500: [brief reading — confirms or diverges from NAS100]

CRYPTO: [BTC/ETH bias — risk-on/risk-off signal for equities, leading/lagging indicator reading]

FOREX (USD): [Dollar strength/weakness — direct implication for NAS100 and GER40 direction]

COMMODITIES:
• Gold: [BULL/BEAR/NEUT] — [safe-haven signal interpretation]
• Oil: [BULL/BEAR/NEUT] — [inflation/growth implication]

INTER-MARKET SIGNALS:
• [Key correlation or divergence e.g. equities up + crypto down = selective risk appetite]
• [USD impact: strong/weak dollar effect on indices]

TECHNICAL BIAS:
• NAS100: [LONG / SHORT / WAIT] — [specific reason with approximate price level or structure]
• GER40: [LONG / SHORT / WAIT] — [specific reason with approximate price level or structure]

FUNDAMENTAL FACTORS:
• [Key macro theme #1 driving price action today]
• [Key macro theme #2 or event risk to watch]

Keep it under 280 words. Be concise, specific, and directly actionable.`;
  try{
    const reply=await callLLM(sysPrompt+'\n\n'+ctx,'Generate the daily market brief now based on the data above.');
    out.textContent=reply;
  }catch(e){out.textContent='Brief generation failed. Check AI connection.';}
}

/* ====== TAB SWITCHING ====== */
function switchTab(tab,btn){
  document.querySelectorAll('.tr-tab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('trOverview').style.display=tab==='overview'?'flex':'none';
  document.getElementById('trLevels').style.display=tab==='levels'?'flex':'none';
  if(tab==='levels')autoFillLevels();
}

/* ====== KEY LEVELS (unchanged) ====== */
function autoFillLevels(){
  if(allMarketData.NAS100?.price)document.getElementById('nasCur').value=Math.round(allMarketData.NAS100.price);
  if(allMarketData.GER40?.price)document.getElementById('gerCur').value=Math.round(allMarketData.GER40.price);
}

function calcLevels(){
  const out=document.getElementById('trLevelsOut');
  const instruments=[
    {name:'NAS100',color:'var(--blue)',pdh:parseFloat(document.getElementById('nasPDH').value),pdl:parseFloat(document.getElementById('nasPDL').value),cur:parseFloat(document.getElementById('nasCur').value)},
    {name:'GER40',color:'var(--cyan)',pdh:parseFloat(document.getElementById('gerPDH').value),pdl:parseFloat(document.getElementById('gerPDL').value),cur:parseFloat(document.getElementById('gerCur').value)},
  ].filter(i=>i.pdh&&i.pdl&&i.pdh>i.pdl);
  if(!instruments.length){
    out.innerHTML='<div style="color:var(--t2);text-align:center;padding:20px;font-size:9px">ENTER PDH AND PDL (PDH must be above PDL)</div>';
    return;
  }
  out.innerHTML=instruments.map(inst=>{
    const range=inst.pdh-inst.pdl;
    const eq=inst.pdl+range/2;
    const fvgBull=inst.pdh-range*0.25;
    const fvgBear=inst.pdl+range*0.25;
    const eqHigh=inst.pdh+range*0.15;
    const eqLow=inst.pdl-range*0.15;
    const hasCur=!isNaN(inst.cur)&&inst.cur>0;
    const bias=hasCur?(inst.cur>eq?'BULLISH (price above EQ)':'BEARISH (price below EQ)'):'—';
    const biasClass=hasCur?(inst.cur>eq?'bull':'bear'):'';
    return`<div class="lv-block">
      <div class="lv-block-title" style="color:${inst.color}">${inst.name} — Range: ${range.toFixed(0)} pts</div>
      <div class="lv-line"><span class="lv-line-name">Equal Highs Target (BSL)</span><span class="lv-line-val bear">${eqHigh.toFixed(0)}</span></div>
      <div class="lv-line"><span class="lv-line-name">PDH — Liquidity Above</span><span class="lv-line-val bear">${inst.pdh.toLocaleString()}</span></div>
      <div class="lv-line"><span class="lv-line-name">FVG / OB Bear Zone (~75%)</span><span class="lv-line-val" style="color:#a78bfa">${fvgBull.toFixed(0)} – ${inst.pdh.toFixed(0)}</span></div>
      <div class="lv-line" style="border-top:1px solid rgba(245,158,11,.2);border-bottom:1px solid rgba(245,158,11,.2);padding:4px 0;margin:2px 0"><span class="lv-line-name" style="color:var(--amb)">Equilibrium (50%) ★</span><span class="lv-line-val key">${eq.toFixed(0)}</span></div>
      <div class="lv-line"><span class="lv-line-name">FVG / OB Bull Zone (~25%)</span><span class="lv-line-val" style="color:#a78bfa">${inst.pdl.toFixed(0)} – ${fvgBear.toFixed(0)}</span></div>
      <div class="lv-line"><span class="lv-line-name">PDL — Liquidity Below</span><span class="lv-line-val bull">${inst.pdl.toLocaleString()}</span></div>
      <div class="lv-line"><span class="lv-line-name">Equal Lows Target (SSL)</span><span class="lv-line-val bull">${eqLow.toFixed(0)}</span></div>
      ${hasCur?`<div class="lv-line" style="border-top:1px solid var(--bdr);margin-top:4px"><span class="lv-line-name">Current Price</span><span class="lv-line-val">${inst.cur.toLocaleString()}</span></div>
      <div class="lv-line"><span class="lv-line-name">Session Bias</span><span class="lv-line-val ${biasClass}">${bias}</span></div>`:''}
    </div>`;
  }).join('');
}

/* ====== POSTMESSAGE ====== */
window.addEventListener('message',e=>{
  if(e.data?.type==='MARKET_DATA'){allMarketData={...allMarketData,...e.data.data};renderMarkets();}
  if(e.data?.type==='GROQ_KEY'&&e.data.key)userGroqKey=e.data.key;
});

/* ====== INIT ====== */
(function(){
  const tab=new URLSearchParams(location.search).get('tab');
  switchTab(['overview','levels'].includes(tab)?tab:'overview');
  fetchMarkets();
  setInterval(fetchMarkets,60000);
})();
</script>

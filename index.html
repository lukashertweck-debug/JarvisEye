<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S. — Global Intelligence Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060810;--bg2:#0a0e18;--bg3:#0e1220;--bdr:rgba(255,255,255,0.05);
--txt:#d1d5db;--t2:#6b7280;--t3:#374151;--blue:#3b82f6;--grn:#22c55e;--red:#ef4444;--amb:#f59e0b;--cyan:#06b6d4;
--f:'JetBrains Mono',monospace;--blue-g:rgba(59,130,246,0.07)}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--f);font-size:11px;overflow:hidden}

/* Layout */
.app{display:grid;height:100vh;grid-template-rows:42px 1fr 28px;grid-template-areas:"hd" "main" "st"}

/* Header */
.hd{grid-area:hd;background:var(--bg);display:flex;align-items:center;padding:0 16px;gap:14px;border-bottom:1px solid var(--bdr)}
.logo{display:flex;align-items:center;gap:8px}
.logo-r{width:22px;height:22px;border:1.5px solid var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
.logo-r::before{content:'';width:6px;height:6px;background:var(--blue);border-radius:50%;animation:cp 2s ease-in-out infinite}
@keyframes cp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.logo-t{font-size:13px;font-weight:600;letter-spacing:4px;color:#fff}
.sep{width:1px;height:18px;background:var(--bdr)}
.tabs{display:flex;gap:2px}
.tab{padding:5px 14px;font-family:var(--f);font-size:9px;background:0;border:1px solid transparent;color:var(--t2);cursor:pointer;letter-spacing:1px;border-radius:3px;transition:.15s}
.tab:hover{color:var(--txt);background:var(--bg2)}
.tab.on{color:var(--blue);border-color:rgba(59,130,246,.2);background:var(--blue-g)}
.hd-r{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:9px;color:var(--t2)}
.live{color:var(--grn);display:flex;align-items:center;gap:4px}
.live::before{content:'';width:5px;height:5px;background:var(--grn);border-radius:50%;animation:bk 1.5s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}
#ck{color:#fff;font-weight:500;font-size:11px;letter-spacing:1px}

/* Pages */
.page{display:none;height:100%}.page.on{display:grid}

/* ═══ OVERVIEW PAGE ═══ */
.overview{grid-area:main;grid-template-columns:1fr 320px;grid-template-rows:1fr 1fr;gap:1px;background:var(--bdr)}
.overview .globe-wrap{grid-row:span 2;position:relative;background:var(--bg)}
#globeViz{width:100%;height:100%}
.globe-stats{position:absolute;bottom:10px;left:14px;display:flex;gap:12px;pointer-events:none;z-index:5}
.gs{display:flex;flex-direction:column;gap:1px}
.gs-v{font-size:15px;font-weight:600;color:#fff;line-height:1}
.gs-l{font-size:7px;color:var(--t2);letter-spacing:1px;text-transform:uppercase}

/* Event popup */
.popup{position:absolute;z-index:20;background:rgba(6,8,16,.95);border:1px solid var(--bdr);border-radius:6px;width:320px;max-height:400px;overflow-y:auto;backdrop-filter:blur(12px);display:none}
.popup.show{display:block;animation:popIn .2s}
@keyframes popIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.popup-hd{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px}
.popup-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.popup-title{font-size:11px;font-weight:600;color:#fff;flex:1}
.popup-close{background:0;border:0;color:var(--t2);cursor:pointer;font-family:var(--f);font-size:14px;padding:0 4px}
.popup-close:hover{color:#fff}
.popup-body{padding:10px 14px}
.popup-desc{font-size:10px;color:var(--t2);line-height:1.6;margin-bottom:8px}
.popup-impact{display:inline-block;font-size:8px;padding:2px 6px;border-radius:2px;font-weight:600;letter-spacing:.5px;margin-bottom:8px}
.popup-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.popup-tag{font-size:7px;padding:2px 5px;border:1px solid var(--bdr);border-radius:2px;color:var(--t3)}
.popup-news{border-top:1px solid var(--bdr);padding-top:8px}
.popup-news-t{font-size:8px;color:var(--t2);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}
.popup-news-item{padding:4px 0;border-bottom:1px solid rgba(255,255,255,.02)}
.popup-news-item a{font-size:9px;color:var(--txt);text-decoration:none;line-height:1.5}
.popup-news-item a:hover{color:var(--blue)}
.popup-news-src{font-size:7px;color:var(--t3);text-transform:uppercase;margin-right:4px}

/* News panel */
.pnl{background:var(--bg2);display:flex;flex-direction:column;overflow:hidden}
.ph{padding:6px 12px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.pt{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t2)}
.pb{font-size:7px;padding:2px 6px;border-radius:2px;font-weight:500;letter-spacing:.5px}
.pbody{flex:1;overflow-y:auto;padding:8px 12px}
.pbody::-webkit-scrollbar{width:2px}
.pbody::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06)}

/* News items */
.ni{padding:7px 0;border-bottom:1px solid rgba(255,255,255,.025);cursor:pointer;transition:.1s}
.ni:hover{background:var(--blue-g);margin:0 -12px;padding:7px 12px}
.nm{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.ns{font-size:7px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.nse{font-size:6.5px;padding:1px 4px;border-radius:1px;font-weight:600;letter-spacing:.3px}
.nse.bu{background:rgba(34,197,94,.1);color:var(--grn)}
.nse.be{background:rgba(239,68,68,.1);color:var(--red)}
.nse.ne{background:rgba(245,158,11,.07);color:var(--amb)}
.nt{font-size:9px;color:var(--txt);line-height:1.5;margin-left:auto;color:var(--t3)}
.ntxt{font-size:10px;color:var(--txt);line-height:1.5}

/* Markets panel */
.mkts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.mc{background:var(--bg);border:1px solid var(--bdr);border-radius:3px;padding:7px 9px;transition:.15s}
.mc:hover{border-color:rgba(59,130,246,.25)}
.mc-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.mc-s{font-size:9px;font-weight:600;color:#fff;letter-spacing:.3px}
.mc-c{font-size:8px;font-weight:600}
.mc-c.up{color:var(--grn)}.mc-c.dn{color:var(--red)}
.mc-p{font-size:16px;font-weight:700;color:#fff;line-height:1;letter-spacing:-.5px}
.mc-l{font-size:7px;color:var(--t2);margin-top:2px}

/* Fear gauge */
.fg-box{background:var(--bg);border:1px solid var(--bdr);border-radius:3px;padding:8px 10px;margin-top:6px}
.fg-r{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.fg-n{font-size:22px;font-weight:700;line-height:1}
.fg-l{font-size:8px;font-weight:600;letter-spacing:1px}
.fg-bar{height:3px;background:var(--bg2);border-radius:2px;overflow:hidden}
.fg-fill{height:100%;border-radius:2px;transition:width 1s}

/* ═══ AGENTS PAGE ═══ */
.agents-page{grid-template-columns:1fr 1fr;grid-template-rows:1fr;gap:1px;background:var(--bdr)}
.agent-card{background:var(--bg2);padding:14px}
.ac-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bdr)}
.ac-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px rgba(34,197,94,.4)}
.ac-dot.off{background:var(--amb);box-shadow:0 0 8px rgba(245,158,11,.3)}
.ac-nm{font-size:12px;font-weight:600;color:#fff;letter-spacing:.5px}
.ac-st{margin-left:auto;font-size:8px;letter-spacing:.5px}
.ac-desc{font-size:10px;color:var(--t2);line-height:1.6;margin-bottom:10px}
.ac-btns{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.ac-btn{font-family:var(--f);font-size:8px;padding:5px 10px;background:var(--bg);border:1px solid var(--bdr);color:var(--t2);border-radius:3px;cursor:pointer;letter-spacing:.5px;transition:.15s}
.ac-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-g)}
.ac-btn.running{border-color:var(--grn);color:var(--grn);pointer-events:none}
.ac-out{background:var(--bg);border:1px solid var(--bdr);border-radius:3px;padding:10px;font-size:9px;color:var(--txt);line-height:1.7;max-height:200px;overflow-y:auto;white-space:pre-wrap;display:none}
.ac-out.show{display:block;animation:fadeIn .2s}
.ac-out::-webkit-scrollbar{width:2px}.ac-out::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ac-out .loading{color:var(--blue);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Status */
.st{grid-area:st;background:var(--bg);display:flex;align-items:center;padding:0 14px;gap:14px;font-size:7.5px;color:var(--t3);letter-spacing:.5px;border-top:1px solid var(--bdr)}
.si{display:flex;align-items:center;gap:3px}
.sd{width:4px;height:4px;border-radius:50%;background:var(--grn)}
.sr{margin-left:auto;display:flex;gap:12px}

/* NIM config bar */
.nim-cfg{padding:6px 12px;background:var(--bg);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;font-size:9px}
.nim-cfg label{color:var(--t2);font-size:8px;letter-spacing:.5px}
.nim-cfg input{background:var(--bg2);border:1px solid var(--bdr);color:var(--txt);font-family:var(--f);font-size:9px;padding:4px 8px;border-radius:3px;flex:1;max-width:280px}
.nim-cfg input:focus{outline:none;border-color:var(--blue)}
.nim-cfg .nim-status{margin-left:8px;font-size:8px}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="hd">
  <div class="logo"><div class="logo-r"></div><div class="logo-t">JARVIS</div></div>
  <div class="sep"></div>
  <div class="tabs">
    <button class="tab on" onclick="showPage('overview',this)">OVERVIEW</button>
    <button class="tab" onclick="showPage('agents',this)">AGENTS</button>
  </div>
  <div class="hd-r">
    <span class="live">LIVE</span>
    <span id="ck">--:--:--</span>
    <span id="dt">---</span>
  </div>
</div>

<!-- ═══ OVERVIEW PAGE ═══ -->
<div class="page overview on" id="pg-overview">
  <div class="globe-wrap">
    <div id="globeViz"></div>
    <div class="globe-stats">
      <div class="gs"><span class="gs-v" id="gM">--</span><span class="gs-l">Crypto MCap</span></div>
      <div class="gs"><span class="gs-v" id="gD">--</span><span class="gs-l">BTC Dom</span></div>
      <div class="gs"><span class="gs-v" id="gV">--</span><span class="gs-l">24h Vol</span></div>
      <div class="gs"><span class="gs-v" id="gF" style="color:var(--red)">--</span><span class="gs-l">Fear&Greed</span></div>
    </div>
    <div class="popup" id="popup">
      <div class="popup-hd">
        <div class="popup-dot" id="popDot"></div>
        <div class="popup-title" id="popTitle"></div>
        <button class="popup-close" onclick="document.getElementById('popup').classList.remove('show')">&times;</button>
      </div>
      <div class="popup-body">
        <div class="popup-desc" id="popDesc"></div>
        <div class="popup-impact" id="popImpact"></div>
        <div class="popup-tags" id="popTags"></div>
        <div class="popup-news" id="popNews"></div>
      </div>
    </div>
  </div>
  <!-- Right column: news top, markets bottom -->
  <div style="display:flex;flex-direction:column;gap:1px;background:var(--bdr)">
    <div class="pnl" style="flex:1.2">
      <div class="ph"><span class="pt">Intelligence Feed</span><span class="pb" style="background:var(--blue-g);color:var(--blue)" id="nCnt">0</span></div>
      <div class="pbody" id="nFeed"><div style="color:var(--t3);text-align:center;padding:20px;font-size:9px;letter-spacing:1px">SCANNING...</div></div>
    </div>
    <div class="pnl" style="flex:0.8">
      <div class="ph"><span class="pt">Markets — Crypto · Indices · Forex · ETFs</span></div>
      <div class="pbody">
        <div class="mkts" id="mGrid"></div>
        <div class="fg-box">
          <div class="fg-r"><span class="fg-n" id="fgN" style="color:var(--red)">--</span><span class="fg-l" id="fgL" style="color:var(--red)">LOADING</span></div>
          <div class="fg-bar"><div class="fg-fill" id="fgF" style="width:0;background:var(--red)"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ AGENTS PAGE ═══ -->
<div class="page agents-page" id="pg-agents">
  <div style="display:flex;flex-direction:column;gap:1px;background:var(--bdr)">
    <div class="nim-cfg">
      <label>NVIDIA NIM KEY:</label>
      <input type="password" id="nimKey" placeholder="nvapi-..." value="">
      <span class="nim-status" id="nimSt" style="color:var(--t3)">NOT SET</span>
    </div>
    <div class="agent-card" style="flex:1" id="agent0"></div>
    <div class="agent-card" style="flex:1" id="agent1"></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:1px;background:var(--bdr)">
    <div class="agent-card" style="flex:1" id="agent2"></div>
    <div class="agent-card" style="flex:1" id="agent3"></div>
  </div>
</div>

<!-- STATUS -->
<div class="st">
  <div class="si"><div class="sd"></div>NVIDIA NIM</div>
  <div class="si"><div class="sd"></div>COINGECKO</div>
  <div class="si"><div class="sd"></div>RSS FEEDS</div>
  <div class="si"><div class="sd"></div>FEAR&GREED API</div>
  <div class="sr"><span>JARVIS v3.0</span><span id="up">00:00</span></div>
</div>

</div>

<!-- Globe.gl -->
<script src="https://unpkg.com/globe.gl@2.35.2/dist/globe.gl.min.js"></script>
<script>
// ═══ CLOCK ═══
const T0=Date.now();
setInterval(()=>{
  const n=new Date();
  document.getElementById('ck').textContent=n.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('dt').textContent=n.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'});
  const u=Math.floor((Date.now()-T0)/1000);
  document.getElementById('up').textContent=String(Math.floor(u/60)).padStart(2,'0')+':'+String(u%60).padStart(2,'0');
},1000);

// ═══ PAGE SWITCHING ═══
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('pg-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='overview'&&globe) globe.controls().update();
}

// ═══ GLOBE EVENTS ═══
const EVENTS=[
  {lat:38.9,lng:-77,name:'United States',label:'Tariffs & Fed Policy',desc:'New tariff expansion targeting China and EU. Fed holds rates hawkish, cuts delayed to H2 2026. Dollar strength pressuring risk assets globally.',color:'#ef4444',impact:'BEARISH',assets:['NAS100','S&P500','DXY','BTC','EUR/USD'],region:'us'},
  {lat:32.4,lng:53.7,name:'Iran',label:'US-Iran Military Tensions',desc:'Brent crude surged past $114/bbl. Strait of Hormuz military posturing. Global risk-off triggered across all asset classes. Oil supply disruption fears.',color:'#ef4444',impact:'BEARISH',assets:['OIL','GOLD','BTC','GER40','NAS100'],region:'iran'},
  {lat:50.1,lng:8.7,name:'European Union',label:'ECB DeFi Regulation & Rates',desc:'ECB paper warns DeFi governance "concentrated". New EU crypto framework likely. Rate decision pending with inflation sticky.',color:'#f59e0b',impact:'MIXED',assets:['EUR/USD','GER40','ETH','AAVE'],region:'eu'},
  {lat:39.9,lng:116.4,name:'China',label:'Trade War Retaliation',desc:'Semiconductor counter-tariffs announced. Supply chain disruption risk rising. Tech sector under pressure globally. Yuan devaluation fears.',color:'#ef4444',impact:'BEARISH',assets:['NAS100','NVDA','AAPL','CNY/USD','HSI'],region:'china'},
  {lat:35.7,lng:139.7,name:'Japan',label:'Yen Crisis — BOJ Watch',desc:'Yen hits 160 vs USD. BOJ intervention imminent. Carry trade unwind risk threatens global liquidity. Exporters benefiting short-term.',color:'#f59e0b',impact:'MIXED',assets:['USD/JPY','NKY225','GER40','BTC'],region:'japan'},
  {lat:13.7,lng:-89.2,name:'El Salvador',label:'BTC Reserve Expansion',desc:'Government adds to BTC strategic reserves. Adoption narrative strengthening. Volcano mining operational. Tourism up 30%.',color:'#22c55e',impact:'BULLISH',assets:['BTC'],region:'elsalvador'},
  {lat:51.5,lng:-0.1,name:'United Kingdom',label:'FCA Crypto Framework',desc:'New staking regulations proposed. Institutional clarity improving. London positioning as crypto hub alongside Switzerland.',color:'#3b82f6',impact:'MIXED',assets:['GBP/USD','ETH','BTC','FTSE100'],region:'uk'},
  {lat:1.35,lng:103.8,name:'Singapore',label:'Asia Crypto Hub Growth',desc:'MAS approves 5 new exchange licenses. Asia liquidity pool expanding. Institutional capital flowing East.',color:'#22c55e',impact:'BULLISH',assets:['BTC','ETH','SOL','SGD'],region:'singapore'},
  {lat:55.7,lng:37.6,name:'Russia',label:'Sanctions & Energy Pivot',desc:'Energy exports rerouting through India/China. Crypto used for cross-border settlements. Ruble volatility elevated.',color:'#ef4444',impact:'BEARISH',assets:['OIL','RUB/USD','GOLD','BTC'],region:'russia'},
  {lat:-23.5,lng:-46.6,name:'Brazil',label:'CBDC Drex Launch',desc:'Brazils CBDC "Drex" pilot expanding. Tokenized government bonds on blockchain. LatAm crypto adoption accelerating.',color:'#22c55e',impact:'BULLISH',assets:['BRL/USD','BTC','ETH'],region:'brazil'},
];

// ═══ 3D GLOBE with globe.gl ═══
let globe;
function initGlobe(){
  const container=document.getElementById('globeViz');
  globe=Globe()(container)
    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
    .backgroundColor('rgba(0,0,0,0)')
    .showAtmosphere(true)
    .atmosphereColor('#1a3a6a')
    .atmosphereAltitude(0.2)
    .hexPolygonsData([])
    .pointsData(EVENTS)
    .pointLat(d=>d.lat)
    .pointLng(d=>d.lng)
    .pointColor(d=>d.color)
    .pointAltitude(0.06)
    .pointRadius(0.4)
    .pointsMerge(false)
    .onPointClick(d=>showPopup(d))
    .onPointHover(d=>{container.style.cursor=d?'pointer':'grab'})
    .ringsData(EVENTS)
    .ringLat(d=>d.lat)
    .ringLng(d=>d.lng)
    .ringColor(d=>()=>d.color)
    .ringMaxRadius(3)
    .ringPropagationSpeed(1.5)
    .ringRepeatPeriod(2000)
    .arcsData([
      {startLat:38.9,startLng:-77,endLat:39.9,endLng:116.4,color:'#ef4444'},
      {startLat:38.9,startLng:-77,endLat:32.4,endLng:53.7,color:'#ef4444'},
      {startLat:50.1,startLng:8.7,endLat:35.7,endLng:139.7,color:'#f59e0b'},
      {startLat:51.5,startLng:-0.1,endLat:1.35,endLng:103.8,color:'#22c55e'},
    ])
    .arcColor(d=>d.color)
    .arcDashLength(0.4)
    .arcDashGap(0.2)
    .arcDashAnimateTime(2500)
    .arcStroke(0.3)
    .labelsData(EVENTS)
    .labelLat(d=>d.lat)
    .labelLng(d=>d.lng)
    .labelText(d=>d.name)
    .labelSize(0.7)
    .labelDotRadius(0.3)
    .labelColor(d=>()=>d.color)
    .labelResolution(2);

  // Load country polygons
  fetch('https://unpkg.com/world-atlas@2/countries-110m.json')
    .then(r=>r.json())
    .then(topology=>{
      const countries=topojson.feature(topology,topology.objects.countries);
      globe.polygonsData(countries.features)
        .polygonCapColor(()=>'rgba(30,58,95,0.25)')
        .polygonSideColor(()=>'rgba(30,58,95,0.1)')
        .polygonStrokeColor(()=>'rgba(59,130,246,0.2)')
        .polygonAltitude(0.005);
    });

  // Auto rotate
  globe.controls().autoRotate=true;
  globe.controls().autoRotateSpeed=0.3;
  globe.controls().enableZoom=true;
  globe.controls().minDistance=180;
  globe.controls().maxDistance=500;

  // Set initial view
  globe.pointOfView({lat:25,lng:20,altitude:2.2},0);
}

// ═══ POPUP ═══
let allNewsItems=[];
function showPopup(ev){
  const popup=document.getElementById('popup');
  popup.classList.add('show');
  document.getElementById('popDot').style.background=ev.color;
  document.getElementById('popTitle').textContent=ev.name+' — '+ev.label;
  document.getElementById('popDesc').textContent=ev.desc;
  const imp=document.getElementById('popImpact');
  imp.textContent=ev.impact;
  imp.style.background=ev.impact==='BEARISH'?'rgba(239,68,68,.12)':ev.impact==='BULLISH'?'rgba(34,197,94,.12)':'rgba(245,158,11,.08)';
  imp.style.color=ev.impact==='BEARISH'?'var(--red)':ev.impact==='BULLISH'?'var(--grn)':'var(--amb)';
  document.getElementById('popTags').innerHTML=ev.assets.map(a=>`<span class="popup-tag">${a}</span>`).join('');

  // Filter relevant news
  const keywords=ev.label.toLowerCase().split(/[\s—&]+/).filter(w=>w.length>3);
  const relevant=allNewsItems.filter(n=>{
    const t=n.title.toLowerCase();
    return keywords.some(k=>t.includes(k))||ev.assets.some(a=>t.includes(a.toLowerCase()));
  }).slice(0,5);

  const newsDiv=document.getElementById('popNews');
  if(relevant.length){
    newsDiv.innerHTML=`<div class="popup-news-t">Related Headlines</div>`+
      relevant.map(n=>`<div class="popup-news-item"><span class="popup-news-src">${n.src}</span><a href="${n.link}" target="_blank">${n.title}</a></div>`).join('');
  } else {
    newsDiv.innerHTML=`<div class="popup-news-t">No matching headlines found</div>`;
  }

  // Position popup
  popup.style.top='60px';popup.style.right='340px';popup.style.left='auto';
}

function fB(n){return n>=1e12?'$'+(n/1e12).toFixed(2)+'T':n>=1e9?'$'+(n/1e9).toFixed(1)+'B':'$'+(n/1e6).toFixed(0)+'M'}

// Fetch forex rates from Frankfurter API (free, no key needed)
// Fetches today + yesterday to compute daily % change
async function fetchForex(){
  try{
    const today=new Date();
    const yest=new Date(today);yest.setDate(yest.getDate()-1);
    // Skip weekends for previous day
    if(yest.getDay()===0)yest.setDate(yest.getDate()-2);
    else if(yest.getDay()===6)yest.setDate(yest.getDate()-1);
    const yStr=yest.toISOString().slice(0,10);

    const [rNow,rPrev]=await Promise.all([
      fetch('https://api.frankfurter.app/latest?from=USD&to=EUR,GBP,JPY').then(r=>r.json()),
      fetch(`https://api.frankfurter.app/${yStr}?from=USD&to=EUR,GBP,JPY`).then(r=>r.json()).catch(()=>null)
    ]);
    const results=[];
    const pairs=[
      {key:'EUR',s:'EUR/USD',inv:true},
      {key:'GBP',s:'GBP/USD',inv:true},
      {key:'JPY',s:'USD/JPY',inv:false}
    ];
    pairs.forEach(({key,s,inv})=>{
      if(!rNow.rates[key])return;
      const now=inv?1/rNow.rates[key]:rNow.rates[key];
      const prev=rPrev&&rPrev.rates[key]?(inv?1/rPrev.rates[key]:rPrev.rates[key]):now;
      const chg=prev?((now-prev)/prev*100):0;
      results.push({s,p:+(inv?now.toFixed(4):now.toFixed(2)),c:chg,type:'forex'});
    });
    return results;
  }catch(e){return[];}
}

// Fetch indices/commodities from Yahoo Finance via allorigins proxy
async function fetchYahoo(){
  const results=[];
  const symbols=YAHOO_ASSETS.map(a=>a.sym).join(',');
  try{
    const url=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(symbols)}&fields=regularMarketPrice,regularMarketChangePercent,shortName`;
    const r=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(10000)});
    const d=await r.json();
    if(d.quoteResponse&&d.quoteResponse.result){
      d.quoteResponse.result.forEach(q=>{
        const asset=YAHOO_ASSETS.find(a=>a.sym===q.symbol);
        if(asset&&q.regularMarketPrice){
          results.push({s:asset.s,p:q.regularMarketPrice,c:q.regularMarketChangePercent||0,type:asset.type});
        }
      });
    }
  }catch(e){
    // Fallback: try individual fetches via chart API
    for(const asset of YAHOO_ASSETS){
      try{
        const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(asset.sym)}?range=2d&interval=1d`;
        const r=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(6000)});
        const d=await r.json();
        const meta=d?.chart?.result?.[0]?.meta;
        if(meta&&meta.regularMarketPrice){
          const prev=meta.chartPreviousClose||meta.previousClose||meta.regularMarketPrice;
          const chg=prev?((meta.regularMarketPrice-prev)/prev*100):0;
          results.push({s:asset.s,p:meta.regularMarketPrice,c:chg,type:asset.type});
        }
      }catch(e2){}
    }
  }
  return results;
}

async function fetchMkts(){
  const grid=document.getElementById('mGrid');
  try{
    // Fetch all data sources in parallel
    const [cryptoRes,forexData,yahooData]=await Promise.all([
      fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ASSETS.map(a=>a.id).join(',')}&sparkline=false&price_change_percentage=24h`).then(r=>r.json()).catch(()=>[]),
      fetchForex(),
      fetchYahoo()
    ]);

    let html='';
    let totalVol=0,btcMcap=0,totalMcap=0;

    // Crypto from CoinGecko
    if(Array.isArray(cryptoRes)){
      cryptoRes.forEach(c=>{
        const a=ASSETS.find(x=>x.id===c.id);if(!a)return;
        const ch=c.price_change_percentage_24h||0;
        totalVol+=c.total_volume||0;
        totalMcap+=c.market_cap||0;
        if(a.s==='BTC')btcMcap=c.market_cap;

      });

    // Combine live extra assets
    EXTRA_ASSETS=[...yahooData,...forexData];

    // Render extra assets (live data)
    EXTRA_ASSETS.forEach(a=>{
      html+=mkCard(a.s,fP(a.p),a.c!==undefined?a.c:0,a.type);
    });

    grid.innerHTML=html||'<div style="color:var(--t3);text-align:center;padding:10px;font-size:9px">FETCHING...</div>';

    // Update globe stats with live data
    document.getElementById('gM').textContent=totalMcap?fB(totalMcap):'--';

    document.getElementById('gV').textContent=totalVol?fB(totalVol):'--';
  }catch(e){
    grid.innerHTML='<div style="color:var(--t3);text-align:center;padding:10px;font-size:9px">DATA ERROR — RETRYING</div>';
  }
}
function mkCard(sym,price,ch,type){
  const cls=ch>=0?'up':'dn';const sign=ch>=0?'+':'';
  const tColor=type==='crypto'?'var(--cyan)':type==='index'?'var(--blue)':type==='forex'?'var(--amb)':type==='commodity'?'#f59e0b':'var(--t2)';
  return `<div class="mc"><div class="mc-h"><span class="mc-s">${sym}</span><span class="mc-c ${cls}">${sign}${ch.toFixed(2)}%</span></div><div class="mc-p">${price}</div><div class="mc-l" style="color:${tColor}">${type.toUpperCase()}</div></div>`;
}

const FEEDS=[
  {n:'TheBlock',u:'https://www.theblock.co/rss.xml'},
  {n:'Decrypt',u:'https://decrypt.co/feed'},
  {n:'BBC Biz',u:'http://feeds.bbci.co.uk/news/business/rss.xml'},
  {n:'BBC World',u:'http://feeds.bbci.co.uk/news/world/rss.xml'},
  {n:'CNBC',u:'https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114'},
];
const SW={bu:['surge','rally','adoption','bullish','gain','soar','record','inflows','positive','recovery','growth','approval','buy','accumulation','etf inflow'],
be:['crash','dump','bearish','fear','sell','drop','decline','ban','hack','exploit','tariff','war','sanction','tension','correction','outflow','plunge','tumble','crisis','iran','military','hawkish','recession']};
function sent(t){const l=t.toLowerCase();let b=0,r=0;SW.bu.forEach(k=>{if(l.includes(k))b++});SW.be.forEach(k=>{if(l.includes(k))r++});return b>r?'bu':r>b?'be':'ne'}
function ago(d){const s=(Date.now()-d)/1000;if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d'}

async function fetchNews(){
  const items=[];
  for(const f of FEEDS){
    try{
      const r=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(f.u)}`,{signal:AbortSignal.timeout(8000)});
      const txt=await r.text();
      const xml=new DOMParser().parseFromString(txt,'text/xml');
      xml.querySelectorAll('item').forEach((it,i)=>{
        if(i>=6)return;
        const title=it.querySelector('title')?.textContent?.trim();
        const pub=it.querySelector('pubDate')?.textContent;
        const link=it.querySelector('link')?.textContent;
        if(title)items.push({src:f.n,title,time:pub?new Date(pub).getTime():Date.now(),link,s:sent(title)});
      });
    }catch(e){}
  }
  items.sort((a,b)=>b.time-a.time);
  allNewsItems=items;
  document.getElementById('nCnt').textContent=items.length;
  const feed=document.getElementById('nFeed');
  if(!items.length){feed.innerHTML='<div style="color:var(--t3);text-align:center;padding:20px;font-size:9px">NO DATA</div>';return}
  feed.innerHTML=items.slice(0,30).map(it=>{
    const sLabel={bu:'BULL',be:'BEAR',ne:'NEUT'}[it.s];
    return `<div class="ni" onclick="window.open('${it.link}','_blank')"><div class="nm"><span class="ns">${it.src}</span><span class="nse ${it.s}">${sLabel}</span><span class="nt">${ago(it.time)}</span></div><div class="ntxt">${it.title}</div></div>`;
  }).join('');
}

async function callNIM(prompt,system){
  const key=nimKeyInput.value||localStorage.getItem('jarvis_nim_key')||'';
  if(!key){return 'ERROR: Enter your NVIDIA NIM API key in the Agents tab first.\nGet one free at: https://build.nvidia.com/settings/api-keys';}
  try{
    const r=await fetch('https://integrate.api.nvidia.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model:'moonshotai/kimi-k2.5',
        messages:[
          ...(system?[{role:'system',content:system}]:[]),
          {role:'user',content:prompt}
        ],
        temperature:0.3,max_tokens:1500
      })
    });
    const d=await r.json();
    if(d.error)return 'NIM Error: '+(d.error.message||JSON.stringify(d.error));
    return d.choices?.[0]?.message?.content||'No response';
  }catch(e){return 'Connection error: '+e.message;}
}

async function runAgent(agentIdx,cmdIdx){
  const cmd=AGENTS[agentIdx].cmds[cmdIdx];
  const btn=document.getElementById(`btn${agentIdx}_${cmdIdx}`);
  const out=document.getElementById('out'+agentIdx);
  btn.classList.add('running');btn.textContent='RUNNING...';
  out.classList.add('show');
  out.innerHTML='<span class="loading">⟳ JARVIS processing...</span>';

  let system,prompt;
  if(agentIdx===0){ // News
    const headlines=allNewsItems.slice(0,15).map(n=>`[${n.src}] ${n.title}`).join('\n');
    system='You are JARVIS, expert financial news analyst. Analyze headlines for market impact. Be concise, direct, use trader language. Cover crypto, indices, forex, and geopolitical factors.';
    prompt=cmd.asset==='markets'?
      `Analyze these latest headlines for OVERALL market impact:\n\n${headlines}\n\nGive: Overall sentiment, key events, which assets are affected, and trade implications.`:
      `Analyze these headlines specifically for ${cmd.asset} impact:\n\n${headlines}\n\nGive: Sentiment (-10 to +10), key events affecting ${cmd.asset}, and what traders should do.`;
  }
  else if(agentIdx===1){ // Chart
    system='You are JARVIS, expert technical analyst. You know SMC/ICT methodology, support/resistance, EMA stacks, RSI, MACD. Be direct and give actionable levels.';
    prompt=`Give me a technical analysis for ${cmd.asset} right now. Include: current bias (bullish/bearish/neutral with confidence), key support and resistance levels, RSI zone, EMA alignment, and what setup you would look for. Use current market conditions (March 2026, extreme fear environment, BTC around $66-68k range).`;
  }
  else if(agentIdx===2){ // Strategy
    const headlines=allNewsItems.slice(0,10).map(n=>`[${n.src}] ${n.title}`).join('\n');
    system='You are JARVIS, autonomous trading strategist. Combine technicals + news into clear trade signals. Format: SIGNAL (LONG/SHORT/NO_TRADE), Entry, Stop Loss, TP1, TP2, TP3, Risk:Reward, Reasoning, Confluence factors.';
    prompt=cmd.asset==='scan'?
      `Quick scan: Give bias and signal for BTC/USDT, ETH/USDT, NAS100, and GOLD right now. Current market: extreme fear, BTC ~$66-68k. News:\n${headlines}`:
      `Generate a trade signal for ${cmd.asset}. Current market: extreme fear environment, bearish bias across most assets. Recent news:\n${headlines}\n\nGive concrete entry, SL, TP levels and risk:reward.`;
  }
  else{ // Exec
    out.innerHTML='Execution Agent is in development (Phase 4).\n\nWhen ready, it will:\n• Place orders via CCXT (Bybit, Binance)\n• Manage position sizing (max 2% risk)\n• Trail stops automatically\n• Take partial profits at TP levels\n\nFor now, use signals from the Strategy Agent\nand execute manually.';
    btn.classList.remove('running');btn.textContent=cmd.l;return;
  }

  const result=await callNIM(prompt,system);
  out.textContent='> JARVIS '+AGENTS[agentIdx].name+' — '+cmd.l+'\n\n'+result;
  btn.classList.remove('running');btn.textContent=cmd.l;
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S. — Global Intelligence Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#04060a;--bg2:#080c14;--bg3:#0c1018;--bdr:rgba(59,130,246,0.08);
--txt:#c8d0dc;--t2:#5a6a80;--t3:#2e3a4a;--blue:#3b82f6;--grn:#22c55e;--red:#ef4444;--amb:#f59e0b;--cyan:#06b6d4;
--f:'JetBrains Mono',monospace;--blue-g:rgba(59,130,246,0.05);--glow:rgba(59,130,246,0.15)}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--f);font-size:11px;overflow:hidden}
.app{display:grid;height:100vh;grid-template-rows:44px 1fr 26px;grid-template-areas:"hd" "main" "st"}

/* Header */
.hd{grid-area:hd;background:var(--bg);display:flex;align-items:center;padding:0 16px;gap:14px;border-bottom:1px solid var(--bdr)}
.logo{display:flex;align-items:center;gap:8px}
.logo-r{width:22px;height:22px;border:1.5px solid var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
.logo-r::before{content:'';width:6px;height:6px;background:var(--blue);border-radius:50%;animation:cp 2s ease-in-out infinite}
@keyframes cp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.logo-t{font-size:13px;font-weight:600;letter-spacing:4px;color:#fff}
.sep{width:1px;height:18px;background:var(--bdr)}
.tabs{display:flex;gap:2px}
.tab{padding:5px 14px;font-family:var(--f);font-size:9px;background:0;border:1px solid transparent;color:var(--t2);cursor:pointer;letter-spacing:1px;border-radius:3px;transition:.15s}
.tab:hover{color:var(--txt);background:var(--bg2)}
.tab.on{color:var(--blue);border-color:rgba(59,130,246,.2);background:var(--blue-g)}
.hd-r{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:9px;color:var(--t2)}
.live{color:var(--grn);display:flex;align-items:center;gap:4px}
.live::before{content:'';width:5px;height:5px;background:var(--grn);border-radius:50%;animation:bk 1.5s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}
#ck{color:#fff;font-weight:500;font-size:11px;letter-spacing:1px}

/* Pages */
.page{display:none;height:100%}.page.on{display:grid}

/* ═══ OVERVIEW — 3 columns ═══ */
.overview{grid-area:main;grid-template-columns:280px 1fr 280px;gap:0;background:var(--bg)}

/* Left column */
.ov-left{display:flex;flex-direction:column;border-right:1px solid var(--bdr);overflow:hidden}
.ov-left-feed{height:55%;display:flex;flex-direction:column;overflow:hidden;border-bottom:1px solid var(--bdr)}
.ov-left-pred{height:45%;display:flex;flex-direction:column;overflow:hidden}

/* Center */
.ov-center{position:relative;background:var(--bg)}
#globeViz{width:100%;height:100%}
.globe-stats{position:absolute;bottom:12px;left:16px;display:flex;gap:16px;pointer-events:none;z-index:5}
.gs{display:flex;flex-direction:column;gap:2px;background:rgba(4,6,10,.7);padding:6px 10px;border-radius:4px;border:1px solid var(--bdr)}
.gs-v{font-size:14px;font-weight:700;color:#fff;line-height:1}
.gs-l{font-size:6.5px;color:var(--t2);letter-spacing:1.5px;text-transform:uppercase}

/* Right column */
.ov-right{display:flex;flex-direction:column;border-left:1px solid var(--bdr);overflow:hidden}
.ov-right-mkts{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ov-right-fg{padding:10px 12px;border-top:1px solid var(--bdr);background:var(--bg2)}

/* Panel headers — CIA style */
.ph{padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bdr);flex-shrink:0;background:var(--bg2);position:relative}
.ph::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--blue)}
.pt{font-size:8px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--blue)}
.pb{font-size:7px;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:.5px}
.pbody{flex:1;overflow-y:auto;padding:8px 12px}
.pbody::-webkit-scrollbar{width:3px}
.pbody::-webkit-scrollbar-thumb{background:rgba(59,130,246,.15);border-radius:2px}

/* News items */
.ni{padding:8px 0;border-bottom:1px solid rgba(59,130,246,.04);cursor:pointer;transition:.15s}
.ni:hover{background:rgba(59,130,246,.04);margin:0 -12px;padding:8px 12px;border-left:2px solid var(--blue)}
.nm{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.ns{font-size:7px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.nse{font-size:6px;padding:2px 5px;border-radius:2px;font-weight:700;letter-spacing:.5px}
.nse.bu{background:rgba(34,197,94,.12);color:var(--grn);border:1px solid rgba(34,197,94,.2)}
.nse.be{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.nse.ne{background:rgba(245,158,11,.08);color:var(--amb);border:1px solid rgba(245,158,11,.15)}
.nt{font-size:7px;color:var(--t3);margin-left:auto}
.ntxt{font-size:10px;color:var(--txt);line-height:1.5;font-weight:400}

/* Prediction items */
.pred-item{padding:8px 0;border-bottom:1px solid rgba(59,130,246,.04);cursor:pointer;transition:.15s}
.pred-item:hover{background:rgba(59,130,246,.04);margin:0 -12px;padding:8px 12px}
.pred-q{font-size:10px;color:#fff;line-height:1.4;margin-bottom:5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.pred-bar{background:rgba(255,255,255,.03);border-radius:3px;height:18px;overflow:hidden;margin-bottom:4px;position:relative;border:1px solid var(--bdr)}
.pred-fill{height:100%;display:flex;align-items:center;padding:0 6px;font-size:8px;font-weight:700;color:#fff;letter-spacing:.5px;transition:width .5s}
.pred-stats{display:flex;justify-content:space-between;font-size:7.5px;color:var(--t2);font-weight:500}

/* Market cards */
.mkts{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:2px}
.mc{background:var(--bg);border:1px solid var(--bdr);border-radius:4px;padding:8px 10px;cursor:pointer;transition:.2s}
.mc:hover{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.03);box-shadow:0 0 12px rgba(59,130,246,.08)}
.mc-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.mc-s{font-size:9px;font-weight:700;color:#fff;letter-spacing:.5px}
.mc-c{font-size:8px;font-weight:700}
.mc-c.up{color:var(--grn)}.mc-c.dn{color:var(--red)}
.mc-p{font-size:15px;font-weight:700;color:#fff;line-height:1;letter-spacing:-.3px}
.mc-l{font-size:6px;color:var(--t2);margin-top:2px;letter-spacing:1px;text-transform:uppercase}

/* Fear gauge */
.fg-r{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.fg-n{font-size:20px;font-weight:700;line-height:1}
.fg-l{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.fg-bar{height:4px;background:rgba(255,255,255,.03);border-radius:2px;overflow:hidden;border:1px solid var(--bdr)}
.fg-fill{height:100%;border-radius:2px;transition:width 1s}

/* Popup */
.popup{position:absolute;z-index:20;background:rgba(4,6,10,.96);border:1px solid var(--bdr);border-radius:6px;width:340px;max-height:420px;overflow-y:auto;backdrop-filter:blur(16px);display:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.popup.show{display:block;animation:popIn .2s}
@keyframes popIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.popup-hd{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px}
.popup-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.popup-title{font-size:11px;font-weight:600;color:#fff;flex:1}
.popup-close{background:0;border:0;color:var(--t2);cursor:pointer;font-family:var(--f);font-size:14px;padding:0 4px}
.popup-close:hover{color:#fff}
.popup-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.popup-price{font-size:26px;font-weight:700;color:#fff;line-height:1}
.popup-stat{display:flex;justify-content:space-between;align-items:center;font-size:10px;padding:4px 0}
.popup-stat-label{color:var(--t2)}
.popup-stat-value{color:#fff;font-weight:600}
.popup-badge{font-size:7px;padding:3px 8px;border-radius:3px;font-weight:700;letter-spacing:1px;display:inline-block;width:fit-content}
.popup-badge.crypto{background:rgba(6,182,212,.1);color:var(--cyan);border:1px solid rgba(6,182,212,.2)}
.popup-badge.index{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.popup-badge.forex{background:rgba(245,158,11,.1);color:var(--amb);border:1px solid rgba(245,158,11,.2)}
.popup-badge.commodity{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.popup-badge.etf{background:rgba(139,92,246,.1);color:#8b5cf6;border:1px solid rgba(139,92,246,.2)}

/* ═══ AGENTS PAGE ═══ */
.agents-page{grid-template-columns:1fr 1fr;grid-template-rows:1fr;gap:1px;background:var(--bdr)}
.agent-card{background:var(--bg2);padding:14px}
.ac-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bdr)}
.ac-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px rgba(34,197,94,.4)}
.ac-dot.off{background:var(--amb);box-shadow:0 0 8px rgba(245,158,11,.3)}
.ac-nm{font-size:12px;font-weight:600;color:#fff;letter-spacing:.5px}
.ac-st{margin-left:auto;font-size:8px;letter-spacing:.5px}
.ac-desc{font-size:10px;color:var(--t2);line-height:1.6;margin-bottom:10px}
.ac-btns{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.ac-btn{font-family:var(--f);font-size:8px;padding:5px 10px;background:var(--bg);border:1px solid var(--bdr);color:var(--t2);border-radius:3px;cursor:pointer;letter-spacing:.5px;transition:.15s}
.ac-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-g)}
.ac-btn.running{border-color:var(--grn);color:var(--grn);pointer-events:none}
.ac-out{background:var(--bg);border:1px solid var(--bdr);border-radius:3px;padding:10px;font-size:9px;color:var(--txt);line-height:1.7;max-height:200px;overflow-y:auto;white-space:pre-wrap;display:none}
.ac-out.show{display:block;animation:fadeIn .2s}
.ac-out::-webkit-scrollbar{width:2px}.ac-out::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ac-out .loading{color:var(--blue);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Status bar */
.st{grid-area:st;background:var(--bg);display:flex;align-items:center;padding:0 14px;gap:14px;font-size:7.5px;color:var(--t3);letter-spacing:.5px;border-top:1px solid var(--bdr)}
.si{display:flex;align-items:center;gap:3px}
.sd{width:4px;height:4px;border-radius:50%;background:var(--grn)}
.sr{margin-left:auto;display:flex;gap:12px}

/* AI config bar */
.nim-cfg{padding:6px 12px;background:var(--bg);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;font-size:9px;flex-wrap:wrap}
.nim-cfg label{color:var(--t2);font-size:8px;letter-spacing:.5px}
.nim-cfg input{background:var(--bg2);border:1px solid var(--bdr);color:var(--txt);font-family:var(--f);font-size:9px;padding:4px 8px;border-radius:3px;flex:1;max-width:280px}
.nim-cfg input:focus{outline:none;border-color:var(--blue)}
.nim-cfg select{background:var(--bg2);border:1px solid var(--bdr);color:var(--txt);font-family:var(--f);font-size:9px;padding:4px 8px;border-radius:3px;cursor:pointer}
.nim-cfg select:focus{outline:none;border-color:var(--blue)}
.nim-cfg .nim-status{margin-left:8px;font-size:8px}

/* Scanline overlay for CIA feel */
.ov-center::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(59,130,246,.008) 2px,rgba(59,130,246,.008) 4px);z-index:1}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="hd">
<div class="logo"><div class="logo-r"></div><div class="logo-t">JARVIS</div></div>
<div class="sep"></div>
<div class="tabs">
<button class="tab on" onclick="showPage('overview',this)">OVERVIEW</button>
<button class="tab" onclick="showPage('agents',this)">AGENTS</button>
</div>
<div class="hd-r">
<span class="live">LIVE</span>
<span id="ck">--:--:--</span>
<span id="dt">---</span>
</div>
</div>

<!-- ═══ OVERVIEW PAGE ═══ -->
<div class="page overview on" id="pg-overview">

<!-- LEFT: Intel Feed + Predictions -->
<div class="ov-left">
<div class="ov-left-feed">
<div class="ph"><span class="pt">Intel Feed</span><span class="pb" style="background:rgba(59,130,246,.1);color:var(--blue)" id="nCnt">0</span></div>
<div class="pbody" id="nFeed"><div style="color:var(--t2);text-align:center;padding:20px;font-size:9px;letter-spacing:2px">SCANNING SOURCES...</div></div>
</div>
<div class="ov-left-pred">
<div class="ph"><span class="pt">Predictions</span><span class="pb" style="background:rgba(245,158,11,.1);color:var(--amb)" id="pCnt">0</span></div>
<div class="pbody" id="pFeed"><div style="color:var(--t2);text-align:center;padding:20px;font-size:9px;letter-spacing:2px">CONNECTING...</div></div>
</div>
</div>

<!-- CENTER: Globe -->
<div class="ov-center">
<div id="globeViz"></div>
<div class="globe-stats">
<div class="gs"><span class="gs-v" id="gM">--</span><span class="gs-l">Crypto MCap</span></div>
<div class="gs"><span class="gs-v" id="gD">--</span><span class="gs-l">BTC Dom</span></div>
<div class="gs"><span class="gs-v" id="gV">--</span><span class="gs-l">24h Vol</span></div>
<div class="gs"><span class="gs-v" id="gF" style="color:var(--red)">--</span><span class="gs-l">Fear&Greed</span></div>
</div>
<div class="popup" id="popup">
<div class="popup-hd">
<div class="popup-dot" id="popDot"></div>
<div class="popup-title" id="popTitle"></div>
<button class="popup-close" onclick="document.getElementById('popup').classList.remove('show')">&times;</button>
</div>
<div class="popup-body" id="popBody"></div>
</div>
</div>

<!-- RIGHT: Markets + Fear&Greed -->
<div class="ov-right">
<div class="ov-right-mkts">
<div class="ph"><span class="pt">Markets</span></div>
<div class="pbody"><div class="mkts" id="mGrid"><div style="color:var(--t2);text-align:center;padding:20px;font-size:9px;letter-spacing:2px">LOADING...</div></div></div>
</div>
<div class="ov-right-fg">
<div class="fg-r"><span class="fg-n" id="fgN" style="color:var(--red)">--</span><span class="fg-l" id="fgL" style="color:var(--red)">LOADING</span></div>
<div class="fg-bar"><div class="fg-fill" id="fgF" style="width:0;background:var(--red)"></div></div>
<div style="font-size:6px;color:var(--t3);letter-spacing:1px;margin-top:4px;text-align:center">FEAR & GREED INDEX</div>
</div>
</div>
</div>

<!-- ═══ AGENTS PAGE ═══ -->
<div class="page agents-page" id="pg-agents">
<div style="display:flex;flex-direction:column;gap:1px;background:var(--bdr)">
<div class="nim-cfg">
<label>AI PROVIDER:</label>
<select id="aiProvider">
<option value="groq">Groq (Free, CORS-friendly)</option>
<option value="nim">NVIDIA NIM</option>
</select>
<label>API KEY:</label>
<input type="password" id="nimKey" placeholder="gsk_... or nvapi-..." value="">
<span class="nim-status" id="nimSt" style="color:var(--t3)">NOT SET</span>
<a href="https://console.groq.com/keys" target="_blank" id="keyLink" style="font-size:7px;color:var(--blue);text-decoration:none;letter-spacing:.5px">GET FREE KEY</a>
</div>
<div class="agent-card" style="flex:1" id="agent0"></div>
<div class="agent-card" style="flex:1" id="agent1"></div>
</div>
<div style="display:flex;flex-direction:column;gap:1px;background:var(--bdr)">
<div class="agent-card" style="flex:1" id="agent2"></div>
<div class="agent-card" style="flex:1" id="agent3"></div>
</div>
</div>

<!-- STATUS -->
<div class="st">
<div class="si"><div class="sd"></div>AI ENGINE</div>
<div class="si"><div class="sd"></div>COINGECKO</div>
<div class="si"><div class="sd"></div>RSS FEEDS</div>
<div class="si"><div class="sd"></div>POLYMARKET</div>
<div class="sr"><span>JARVIS v3.1</span><span id="up">00:00</span></div>
</div>
</div>

<!-- Globe.gl -->
<script src="https://unpkg.com/globe.gl@2.34.1/dist/globe.gl.min.js"></script>
<script>
// ═══ CLOCK ═══
const T0=Date.now();
setInterval(()=>{
  const n=new Date();
  document.getElementById('ck').textContent=n.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('dt').textContent=n.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'});
  const u=Math.floor((Date.now()-T0)/1000);
  document.getElementById('up').textContent=String(Math.floor(u/60)).padStart(2,'0')+':'+String(u%60).padStart(2,'0');
},1000);

// ═══ PAGE SWITCHING ═══
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('pg-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='overview'&&globe) globe.controls().update();
}

// ═══ GLOBE EVENTS ═══
const EVENTS=[
  {lat:38.9,lng:-77,name:'United States',label:'Tariffs & Fed Policy',desc:'New tariff expansion targeting China and EU. Fed holds rates hawkish, cuts delayed to H2 2026. Dollar strength pressuring risk assets globally.',color:'#ef4444',impact:'BEARISH',assets:['NAS100','S&P500','DXY','BTC','EUR/USD'],region:'us'},
  {lat:32.4,lng:53.7,name:'Iran',label:'US-Iran Military Tensions',desc:'Brent crude surged past $114/bbl. Strait of Hormuz military posturing. Global risk-off triggered across all asset classes.',color:'#ef4444',impact:'BEARISH',assets:['OIL','GOLD','BTC','GER40','NAS100'],region:'iran'},
  {lat:50.1,lng:8.7,name:'European Union',label:'ECB DeFi Regulation & Rates',desc:'ECB paper warns DeFi governance "concentrated". New EU crypto framework likely. Rate decision pending with inflation sticky.',color:'#f59e0b',impact:'MIXED',assets:['EUR/USD','GER40','ETH','AAVE'],region:'eu'},
  {lat:39.9,lng:116.4,name:'China',label:'Trade War Retaliation',desc:'Semiconductor counter-tariffs announced. Supply chain disruption risk rising. Tech sector under pressure globally.',color:'#ef4444',impact:'BEARISH',assets:['NAS100','NVDA','AAPL','CNY/USD','HSI'],region:'china'},
  {lat:35.7,lng:139.7,name:'Japan',label:'Yen Crisis — BOJ Watch',desc:'Yen hits 160 vs USD. BOJ intervention imminent. Carry trade unwind risk threatens global liquidity.',color:'#f59e0b',impact:'MIXED',assets:['USD/JPY','NKY225','GER40','BTC'],region:'japan'},
  {lat:13.7,lng:-89.2,name:'El Salvador',label:'BTC Reserve Expansion',desc:'Government adds to BTC strategic reserves. Adoption narrative strengthening. Volcano mining operational.',color:'#22c55e',impact:'BULLISH',assets:['BTC'],region:'elsalvador'},
  {lat:51.5,lng:-0.1,name:'United Kingdom',label:'FCA Crypto Framework',desc:'New staking regulations proposed. Institutional clarity improving. London positioning as crypto hub.',color:'#3b82f6',impact:'MIXED',assets:['GBP/USD','ETH','BTC','FTSE100'],region:'uk'},
  {lat:1.35,lng:103.8,name:'Singapore',label:'Asia Crypto Hub Growth',desc:'MAS approves 5 new exchange licenses. Asia liquidity pool expanding.',color:'#22c55e',impact:'BULLISH',assets:['BTC','ETH','SOL','SGD'],region:'singapore'},
  {lat:55.7,lng:37.6,name:'Russia',label:'Sanctions & Energy Pivot',desc:'Energy exports rerouting through India/China. Crypto used for cross-border settlements.',color:'#ef4444',impact:'BEARISH',assets:['OIL','RUB/USD','GOLD','BTC'],region:'russia'},
  {lat:-23.5,lng:-46.6,name:'Brazil',label:'CBDC Drex Launch',desc:'Brazils CBDC "Drex" pilot expanding. Tokenized government bonds on blockchain.',color:'#22c55e',impact:'BULLISH',assets:['BRL/USD','BTC','ETH'],region:'brazil'},
];

// ═══ 3D GLOBE ═══
let globe;
function initGlobe(){
  const container=document.getElementById('globeViz');
  globe=Globe()(container)
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
    .backgroundColor('rgba(0,0,0,0)')
    .showAtmosphere(true)
    .atmosphereColor('#1a3a6a')
    .atmosphereAltitude(0.2)
    .pointsData(EVENTS).pointLat(d=>d.lat).pointLng(d=>d.lng).pointColor(d=>d.color)
    .pointAltitude(0.06).pointRadius(0.4).pointsMerge(false)
    .onPointClick(d=>showEventPopup(d))

async function fetchForex(){
  try{
    const today=new Date();
    const yest=new Date(today);yest.setDate(yest.getDate()-1);
    if(yest.getDay()===0)yest.setDate(yest.getDate()-2);
    else if(yest.getDay()===6)yest.setDate(yest.getDate()-1);
    const yStr=yest.toISOString().slice(0,10);
    const [rNow,rPrev]=await Promise.all([
      fetch('https://api.frankfurter.app/latest?from=USD&to=EUR,GBP,JPY').then(r=>r.json()),
      fetch(`https://api.frankfurter.app/${yStr}?from=USD&to=EUR,GBP,JPY`).then(r=>r.json()).catch(()=>null)
    ]);
    const results=[];
    [{key:'EUR',s:'EUR/USD',inv:true},{key:'GBP',s:'GBP/USD',inv:true},{key:'JPY',s:'USD/JPY',inv:false}].forEach(({key,s,inv})=>{
      if(!rNow.rates[key])return;
      const now=inv?1/rNow.rates[key]:rNow.rates[key];
      const prev=rPrev&&rPrev.rates[key]?(inv?1/rPrev.rates[key]:rPrev.rates[key]):now;
      const chg=prev?((now-prev)/prev*100):0;
      results.push({s,p:+(inv?now.toFixed(4):now.toFixed(2)),c:chg,type:'forex'});
    });
    return results;
  }catch(e){return[];}
}

async function fetchYahoo(){
  const symbols=YAHOO_ASSETS.map(a=>a.sym).join(',');
  // Strategy 1: corsproxy batch
  try{
    const url=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(symbols)}&fields=regularMarketPrice,regularMarketChangePercent`;
    const r=await fetch('https://corsproxy.io/?url='+encodeURIComponent(url),{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    if(d.quoteResponse&&d.quoteResponse.result){
      const out=[];
      d.quoteResponse.result.forEach(q=>{
        const asset=YAHOO_ASSETS.find(a=>a.sym===q.symbol);
        if(asset&&q.regularMarketPrice) out.push({s:asset.s,p:q.regularMarketPrice,c:q.regularMarketChangePercent||0,type:asset.type});
      });
      if(out.length>=3)return out;
    }
  }catch(e){}
  // Strategy 2: individual chart via corsproxy
  const out=[];
  for(const asset of YAHOO_ASSETS){
    try{
      const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(asset.sym)}?range=2d&interval=1d`;
      const r=await fetch('https://corsproxy.io/?url='+encodeURIComponent(url),{signal:AbortSignal.timeout(6000)});
      const d=await r.json();
      const meta=d?.chart?.result?.[0]?.meta;
      if(meta&&meta.regularMarketPrice){
        const prev=meta.chartPreviousClose||meta.previousClose||meta.regularMarketPrice;
        const chg=prev?((meta.regularMarketPrice-prev)/prev*100):0;
        out.push({s:asset.s,p:meta.regularMarketPrice,c:chg,type:asset.type});
      }
    }catch(e){}
  }
  if(out.length)return out;
  // Strategy 3: allorigins individual
  for(const asset of YAHOO_ASSETS){
    try{
      const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(asset.sym)}?range=2d&interval=1d`;
      const r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url),{signal:AbortSignal.timeout(6000)});
      const d=await r.json();
      const meta=d?.chart?.result?.[0]?.meta;
      if(meta&&meta.regularMarketPrice){
        const prev=meta.chartPreviousClose||meta.previousClose||meta.regularMarketPrice;
        const chg=prev?((meta.regularMarketPrice-prev)/prev*100):0;
        out.push({s:asset.s,p:meta.regularMarketPrice,c:chg,type:asset.type});
      }
    }catch(e){}
  }
  return out;
}

async function fetchMkts(){

const SW={bu:['surge','rally','adoption','bullish','gain','soar','record','inflows','positive','recovery','growth','approval','buy','accumulation','etf inflow'],
be:['crash','dump','bearish','fear','sell','drop','decline','ban','hack','exploit','tariff','war','sanction','tension','correction','outflow','plunge','tumble','crisis','iran','military','hawkish','recession']};
function sent(t){const l=t.toLowerCase();let b=0,r=0;SW.bu.forEach(k=>{if(l.includes(k))b++});SW.be.forEach(k=>{if(l.includes(k))r++});return b>r?'bu':r>b?'be':'ne'}
function ago(d){const s=(Date.now()-d)/1000;if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d'}

async function fetchNews(){
  const items=[];
  for(const f of FEEDS){
    try{
      const r=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(f.u)}`,{signal:AbortSignal.timeout(8000)});
      const txt=await r.text();
      const xml=new DOMParser().parseFromString(txt,'text/xml');
      xml.querySelectorAll('item').forEach((it,i)=>{
        if(i>=5)return;
        const title=it.querySelector('title')?.textContent?.trim();
        const pub=it.querySelector('pubDate')?.textContent;
        const link=it.querySelector('link')?.textContent;
        if(title)items.push({src:f.n,title,time:pub?new Date(pub).getTime():Date.now(),link,s:sent(title)});
      });
    }catch(e){}
  }
  items.sort((a,b)=>b.time-a.time);
  allNewsItems=items;
  document.getElementById('nCnt').textContent=items.length;
  const feed=document.getElementById('nFeed');
  if(!items.length){feed.innerHTML='<div style="color:var(--t2);text-align:center;padding:20px;font-size:9px">NO INTEL</div>';return}

  }).join('');
}

async function fetchPolymarket(){
  const feed=document.getElementById('pFeed');
  try{
    // Use allorigins GET wrapper to avoid CORS
    const apiUrl='https://gamma-api.polymarket.com/markets?limit=20&active=true&closed=false&order=volume24hr&ascending=false';
    const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(apiUrl),{signal:AbortSignal.timeout(12000)});
    const wrapper=await r.json();
    if(!wrapper.contents){throw new Error('No contents');}
    const data=JSON.parse(wrapper.contents);
    if(!Array.isArray(data)){throw new Error('Not array');}
    const preds=data
      .filter(m=>{
        const q=(m.question||'').toLowerCase();
        return !SPORTS_FILTERS.some(s=>q.includes(s));
      })
      .slice(0,8)
      .map(m=>{
        let yesPct=50;
        try{
          const prices=typeof m.outcomePrices==='string'?JSON.parse(m.outcomePrices):m.outcomePrices;
          if(Array.isArray(prices))yesPct=(parseFloat(prices[0])||0.5)*100;
        }catch(e){}
        return {q:m.question||'Unknown',yesPct,vol:m.volume24hr||0,slug:m.slug||''};
      });
    document.getElementById('pCnt').textContent=preds.length;
    if(!preds.length){
      feed.innerHTML='<div style="color:var(--t2);text-align:center;padding:20px;font-size:9px">NO PREDICTIONS</div>';
      return;
    }
    feed.innerHTML=preds.map(p=>{
      const barColor=p.yesPct>50?'var(--grn)':'var(--red)';
      const volStr=p.vol>=1e6?'$'+(p.vol/1e6).toFixed(1)+'M':p.vol>=1e3?'$'+(p.vol/1e3).toFixed(0)+'K':'$'+Math.round(p.vol);
      return `<div class="pred-item" onclick="window.open('https://polymarket.com/event/${p.slug}','_blank')">
        <div class="pred-q">${p.q}</div>
        <div class="pred-bar"><div class="pred-fill" style="width:${Math.max(p.yesPct,8)}%;background:${barColor}">${p.yesPct.toFixed(0)}%</div></div>
        <div class="pred-stats"><span>YES ${p.yesPct.toFixed(0)}% / NO ${(100-p.yesPct).toFixed(0)}%</span><span>${volStr}</span></div>
      </div>`;
    }).join('');
  }catch(e){
    feed.innerHTML='<div style="color:var(--t2);text-align:center;padding:20px;font-size:9px;letter-spacing:1px">RECONNECTING...</div>';
    // Retry once after 5s
    setTimeout(fetchPolymarket,5000);
  }
}

  const hasKey=!!nimKeyInput.value;
  document.getElementById('nimSt').textContent=hasKey?'CONNECTED':'NOT SET';
  document.getElementById('nimSt').style.color=hasKey?'var(--grn)':'var(--t3)';
}
updateKeyStatus();

async function callNIM(prompt,system){
  const key=nimKeyInput.value||localStorage.getItem('jarvis_ai_key')||'';
  const provider=AI_PROVIDERS[aiProviderSelect.value]||AI_PROVIDERS.groq;
  if(!key)return `ERROR: Enter your ${provider.name} API key in the Agents tab.\nGet one free at: ${provider.keyUrl}`;
  const body=JSON.stringify({model:provider.model,messages:[...(system?[{role:'system',content:system}]:[]),{role:'user',content:prompt}],temperature:0.3,max_tokens:1500});
  const attempts=provider.cors?[{url:provider.url}]:[{url:'https://corsproxy.io/?url='+encodeURIComponent(provider.url)},{url:provider.url}];
  for(const attempt of attempts){
    try{
      const r=await fetch(attempt.url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body,signal:AbortSignal.timeout(30000)});
      const d=await r.json();
      if(d.error)return provider.name+' Error: '+(d.error.message||JSON.stringify(d.error));
      return d.choices?.[0]?.message?.content||'No response';
    }catch(e){
      if(attempt===attempts[attempts.length-1])return 'Connection error: '+e.message+'\n\nTip: Switch to Groq (free, CORS-friendly) in the dropdown above.';
    }
  }
}

async function runAgent(agentIdx,cmdIdx){
  const cmd=AGENTS[agentIdx].cmds[cmdIdx];
  const btn=document.getElementById(`btn${agentIdx}_${cmdIdx}`);
  const out=document.getElementById('out'+agentIdx);
  btn.classList.add('running');btn.textContent='RUNNING...';
  out.classList.add('show');
  out.innerHTML='<span class="loading">JARVIS processing...</span>';
  let system,prompt;
  if(agentIdx===0){
    const headlines=allNewsItems.slice(0,15).map(n=>`[${n.src}] ${n.title}`).join('\n');
    system='You are JARVIS, expert financial news analyst. Analyze headlines for market impact. Be concise, direct, use trader language.';
    prompt=cmd.asset==='markets'?`Analyze these latest headlines for OVERALL market impact:\n\n${headlines}\n\nGive: Overall sentiment, key events, which assets are affected, and trade implications.`:`Analyze these headlines specifically for ${cmd.asset} impact:\n\n${headlines}\n\nGive: Sentiment (-10 to +10), key events affecting ${cmd.asset}, and what traders should do.`;
  }else if(agentIdx===1){
    system='You are JARVIS, expert technical analyst. You know SMC/ICT methodology, support/resistance, EMA stacks, RSI, MACD. Be direct and give actionable levels.';
    prompt=`Give me a technical analysis for ${cmd.asset} right now. Include: current bias, key support/resistance levels, RSI zone, EMA alignment, and setup to look for.`;
  }else if(agentIdx===2){
    const headlines=allNewsItems.slice(0,10).map(n=>`[${n.src}] ${n.title}`).join('\n');
    system='You are JARVIS, autonomous trading strategist. Combine technicals + news into clear trade signals. Format: SIGNAL, Entry, Stop Loss, TP1-TP3, Risk:Reward, Reasoning.';
    prompt=cmd.asset==='scan'?`Quick scan: Give bias and signal for BTC/USDT, ETH/USDT, NAS100, and GOLD right now. News:\n${headlines}`:`Generate a trade signal for ${cmd.asset}. Recent news:\n${headlines}\n\nGive concrete entry, SL, TP levels and risk:reward.`;
  }else{
    out.innerHTML='Execution Agent is in development (Phase 4).\nUse signals from the Strategy Agent and execute manually.';
    btn.classList.remove('running');btn.textContent=cmd.l;return;
  }
  const result=await callNIM(prompt,system);
  out.textContent='> JARVIS '+AGENTS[agentIdx].name+' — '+cmd.l+'\n\n'+result;
  btn.classList.remove('running');btn.textContent=cmd.l;
}
